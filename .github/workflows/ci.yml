name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://your-worker.your-subdomain.workers.dev

  # Optional manual deploy to Cloudflare Workers.
  # Disabled by default — this public copy ships without credentials.
  # To use it: add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID as repo
  # secrets, then trigger this workflow manually from the Actions tab.
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: https://your-worker.your-subdomain.workers.dev
      - name: Deploy Worker
        working-directory: dist/server
        run: rm -rf ../../.wrangler && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
